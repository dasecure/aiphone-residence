<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Scanner — Aiphone Residence</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0a0f1a;color:#fff;min-height:100vh}
header{background:#1A2B4A;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid rgba(196,160,80,.25)}
header .logo{width:38px;height:38px;flex-shrink:0}
header h1{color:#C4A050;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
header p{color:#aab8d0;font-size:10px;margin-top:1px}
.container{max-width:480px;margin:0 auto;padding:16px}
.scan-card{background:#111827;border:1px solid #1f2937;border-radius:16px;overflow:hidden;margin-bottom:14px}
.scan-header{background:#1A2B4A;padding:12px 16px;display:flex;align-items:center;gap:10px}
.scan-header .icon{font-size:20px}
.scan-header h2{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#C4A050}
.scan-header p{font-size:11px;color:#aab8d0;margin-top:1px}
#reader-wrap{position:relative;background:#000;width:100%;aspect-ratio:1;overflow:hidden;transition:opacity .3s}
#reader-wrap.locked{opacity:.35;pointer-events:none}
#reader{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;overflow:hidden!important}
#reader__scan_region,#reader > div:first-child{width:100%!important;height:100%!important;position:absolute!important;inset:0!important}
#reader video{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}
#reader__dashboard,#reader__dashboard_section,#reader__filescan_input,#reader__status_span,#reader__header_message{display:none!important}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;z-index:2}
.scan-frame{width:55%;aspect-ratio:1;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)}
.scan-corners{position:absolute;width:55%;aspect-ratio:1}
.scan-corners::before,.scan-corners::after,.scan-corners span::before,.scan-corners span::after{content:'';position:absolute;width:22px;height:22px;border-color:#C4A050;border-style:solid}
.scan-corners::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-corners::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-corners span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-corners span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{position:absolute;width:55%;height:2px;background:linear-gradient(90deg,transparent,#C4A050,transparent);animation:scanline 2.5s ease-in-out infinite;z-index:3}
@keyframes scanline{0%,100%{top:22.5%;opacity:0}10%,90%{opacity:1}50%{top:77.5%}}
.lock-banner{display:none;position:absolute;inset:0;background:rgba(0,0,0,.72);flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:4}
.lock-banner.show{display:flex}
.lock-banner span{font-size:28px}
.lock-banner p{font-size:13px;color:#aab8d0;letter-spacing:.5px}
.scan-controls{padding:14px 16px;display:flex;gap:8px;align-items:center}
.gate-select{flex:1;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#fff;padding:0 11px;font-size:16px;outline:none;min-height:46px;-webkit-appearance:none;appearance:none}
.gate-select:focus{border-color:#C4A050}
.btn-cam{background:#1A2B4A;border:1px solid #C4A050;color:#C4A050;border-radius:8px;padding:0 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s;min-height:46px}
.btn-cam.active{background:#C4A050;color:#0a0f1a}
.btn-cam:hover{background:#C4A050;color:#0a0f1a}
.manual{padding:0 16px 14px}
.manual label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6b7280;display:block;margin-bottom:6px}
.manual-row{display:flex;gap:8px}
.manual input{flex:1;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:0 12px;font-size:16px;color:#fff;font-family:monospace;outline:none;letter-spacing:1px;text-transform:uppercase;min-height:46px}
.manual input::placeholder{text-transform:none;font-family:sans-serif;letter-spacing:0;color:#4b5563;font-size:14px}
.manual input:focus{border-color:#C4A050}
.btn-scan{background:#C4A050;color:#0a0f1a;border:none;border-radius:8px;padding:0 20px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;min-height:46px;white-space:nowrap}
.btn-scan:hover{opacity:.85}
.btn-scan:disabled{opacity:.4;cursor:default}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{width:100%;max-width:420px;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:modal-in .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes modal-in{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:22px 22px 18px;display:flex;align-items:flex-start;gap:14px}
.modal-icon{font-size:44px;line-height:1;flex-shrink:0;margin-top:2px}
.modal-title{font-size:22px;font-weight:800;line-height:1.1}
.modal-code{font-family:monospace;font-size:12px;opacity:.7;margin-top:5px;letter-spacing:1px}
.modal-subtitle{font-size:11px;opacity:.6;margin-top:3px;letter-spacing:.5px}
.visitor-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:6px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.modal-body{padding:0 22px 6px;display:grid;gap:10px}
.modal-row{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:10px}
.modal-row .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;width:72px;flex-shrink:0;padding-top:2px}
.modal-row .val{font-size:14px;font-weight:700;word-break:break-word;flex:1}
.push-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:20px;font-weight:700;margin:6px 22px 0}
.push-ok{background:#064e3b;color:#6ee7b7}
.push-none{background:#1f2937;color:#6b7280}
.modal-dismiss{margin:16px 22px 22px;width:calc(100% - 44px);padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;min-height:54px}
.modal-dismiss:hover{opacity:.88}
.modal.valid .modal-header{background:#064e3b}.modal.valid .modal-title{color:#6ee7b7}
.modal.valid .modal-body{background:#071a11}.modal.valid .modal-dismiss{background:#6ee7b7;color:#022c22}
.modal.invalid .modal-header{background:#450a0a}.modal.invalid .modal-title{color:#fca5a5}
.modal.invalid .modal-body{background:#1a0808}.modal.invalid .modal-dismiss{background:#fca5a5;color:#450a0a}
.modal.warn .modal-header{background:#451a03}.modal.warn .modal-title{color:#fdba74}
.modal.warn .modal-body{background:#1a0e05}.modal.warn .modal-dismiss{background:#fdba74;color:#451a03}
.modal.visitor .modal-header{background:#1e3a5f}.modal.visitor .modal-title{color:#93c5fd}
.modal.visitor .modal-body{background:#0a1929}.modal.visitor .modal-dismiss{background:#93c5fd;color:#0a1929}
#history-wrap{margin-top:6px}
.history-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4b5563;margin-bottom:8px;padding:0 2px}
.history-item{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:12px}
.hi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hi-dot.ok{background:#22c55e}.hi-dot.visitor{background:#60a5fa}.hi-dot.fail{background:#ef4444}
.hi-name{flex:1;font-weight:600;color:#e5e7eb}
.hi-code{font-family:monospace;font-size:10px;color:#6b7280}
.hi-time{font-size:10px;color:#4b5563;white-space:nowrap}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:20px;font-size:11px;color:#374151}
footer span{color:#C4A050}
</style>
</head>
<body>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-icon" id="m-icon"></div>
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-subtitle" id="m-subtitle"></div>
        <div class="modal-code"  id="m-code"></div>
        <div id="m-visitor-badge" style="display:none"><span class="visitor-badge">👤 VISITOR PASS</span></div>
      </div>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div id="m-push"></div>
    <button class="modal-dismiss" id="m-dismiss" onclick="dismissModal()">Dismiss &amp; Scan Next</button>
  </div>
</div>

<header>
  <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="100" fill="#0F1E3A"/><circle cx="100" cy="100" r="94" fill="none" stroke="#C4A050" stroke-width="2"/><rect x="82" y="75" width="36" height="82" fill="#C4A050"/><ellipse cx="100" cy="75" rx="18" ry="18" fill="#C4A050"/><rect x="88" y="85" width="8" height="10" fill="#0F1E3A"/><rect x="104" y="85" width="8" height="10" fill="#0F1E3A"/><rect x="88" y="102" width="8" height="10" fill="#0F1E3A"/><rect x="104" y="102" width="8" height="10" fill="#0F1E3A"/><rect x="88" y="119" width="8" height="10" fill="#0F1E3A"/><rect x="104" y="119" width="8" height="10" fill="#0F1E3A"/><rect x="54" y="105" width="24" height="52" fill="#C8D4E0"/><ellipse cx="66" cy="105" rx="12" ry="12" fill="#C8D4E0"/><rect x="122" y="105" width="24" height="52" fill="#C8D4E0"/><ellipse cx="134" cy="105" rx="12" ry="12" fill="#C8D4E0"/><rect x="40" y="157" width="120" height="4" fill="#C4A050"/><text x="100" y="174" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C4A050" text-anchor="middle" letter-spacing="3">AIPHONE</text><text x="100" y="187" font-family="Arial,sans-serif" font-size="8" fill="#D4C4A0" text-anchor="middle" letter-spacing="2">RESIDENCE</text></svg></div>
  <div><h1>Aiphone Residence</h1><p>Staff Pass Scanner</p></div>
</header>

<div class="container">
  <div class="scan-card">
    <div class="scan-header">
      <div class="icon">📷</div>
      <div><h2>QR Scanner</h2><p>Point camera at pass QR code</p></div>
    </div>
    <div id="reader-wrap">
      <div id="reader"></div>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-corners"><span></span></div>
        <div class="scan-line"></div>
      </div>
      <div class="lock-banner" id="lock-banner">
        <span>🔒</span>
        <p>Dismiss result to scan next pass</p>
      </div>
    </div>
    <div class="scan-controls">
      <select class="gate-select" id="gate-sel">
        <option value="Main Gate">🏠 Main Gate</option>
        <option value="Visitor Checkpoint">👤 Visitor Checkpoint</option>
        <option value="Lobby">🚪 Lobby</option>
        <option value="Pool Gate">🏊 Pool Gate</option>
        <option value="Gym Entrance">🏋️ Gym Entrance</option>
        <option value="BBQ Pit">🔥 BBQ Pit Area</option>
        <option value="Tennis Court">🎾 Tennis Court</option>
        <option value="KTV Room">🎤 KTV Room</option>
      </select>
      <button class="btn-cam active" id="cam-btn" onclick="toggleCam()">Stop Cam</button>
    </div>
    <div class="manual">
      <label>Manual code entry</label>
      <div class="manual-row">
        <input type="text" id="code-input" placeholder="PASS-XXXXXXXX" maxlength="16"
          autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
          inputmode="text"
          oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')">
        <button class="btn-scan" id="scan-btn" onclick="submitCode()">Scan</button>
      </div>
    </div>
  </div>

  <div id="history-wrap">
    <div class="history-title">Recent Scans</div>
    <div id="history"></div>
  </div>
</div>

<footer>&copy; 2026 <span>Aiphone Residence</span> &middot; <a href="./" style="color:#C4A050">Portal</a> &middot; <a href="dashboard.html" style="color:#C4A050">Dashboard</a> &middot; <a href="architecture.html" style="color:#C4A050">Architecture</a></footer>

<script>
const SCAN_URL = 'https://gyllfnsnniuqaarsulsk.supabase.co/functions/v1/aiphone-scan';
const scanHistory = [];
let scanner    = null;
let camRunning = false;
let modalOpen  = false;
let processing = false;

// ── Web Audio sounds ──────────────────────────────────────────────────────────
var _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// Success chime: two ascending tones (E5 → G#5)
function playChime() {
  try {
    var ctx = getAudioCtx();
    var now = ctx.currentTime;
    [[659.25, 0, 0.18], [830.61, 0.19, 0.28]].forEach(function(p) {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(p[0], now + p[1]);
      gain.gain.setValueAtTime(0, now + p[1]);
      gain.gain.linearRampToValueAtTime(0.22, now + p[1] + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + p[1] + p[2]);
      osc.start(now + p[1]);
      osc.stop(now + p[1] + p[2] + 0.02);
    });
  } catch(e) {}
}

// Failure buzz: low descending tone
function playBuzz() {
  try {
    var ctx  = getAudioCtx();
    var now  = ctx.currentTime;
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.linearRampToValueAtTime(140, now + 0.3);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
    osc.start(now); osc.stop(now + 0.32);
  } catch(e) {}
}
// ─────────────────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', function() {
  startCam();
  document.getElementById('code-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitCode(); }
  });
  // Prime AudioContext on first user gesture so iOS doesn't block it later
  document.body.addEventListener('touchstart', function primeAudio() {
    getAudioCtx();
    document.body.removeEventListener('touchstart', primeAudio);
  }, { once: true });
  document.body.addEventListener('click', function primeAudioClick() {
    getAudioCtx();
    document.body.removeEventListener('click', primeAudioClick);
  }, { once: true });
});

async function startCam() {
  try {
    scanner = new Html5Qrcode('reader');
    var qrboxFn = function(w, h) {
      var side = Math.round(Math.min(w, h) * 0.55);
      return { width: side, height: side };
    };
    await scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: qrboxFn, aspectRatio: 1.0 },
      onQRDetected, function() {}
    );
    camRunning = true;
    document.getElementById('cam-btn').textContent = 'Stop Cam';
    document.getElementById('cam-btn').classList.add('active');
  } catch(e) {
    document.getElementById('reader-wrap').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#4b5563;font-size:13px;text-align:center;padding:20px">Camera not available.<br>Use manual entry below.</div>';
    document.getElementById('cam-btn').style.display = 'none';
  }
}
async function stopCam() {
  if (scanner && camRunning) {
    await scanner.stop(); scanner = null; camRunning = false;
    document.getElementById('cam-btn').textContent = 'Start Cam';
    document.getElementById('cam-btn').classList.remove('active');
  }
}
async function toggleCam() { if (camRunning) { await stopCam(); } else { await startCam(); } }

async function onQRDetected(code) {
  if (modalOpen || processing) return;
  if (!code.startsWith('PASS-')) return;
  document.getElementById('code-input').value = code;
  await submitCode(code);
}

async function submitCode(codeOverride) {
  if (modalOpen || processing) return;
  var code = (codeOverride || document.getElementById('code-input').value).trim().toUpperCase();
  if (!code || !code.startsWith('PASS-')) {
    playBuzz();
    openModal('warn', '⚠️', 'Invalid Code', '', code || '—', [['Detail', 'Enter a valid pass code (PASS-XXXXXXXX)']]);
    return;
  }
  processing = true; lockUI(true);
  var gate = document.getElementById('gate-sel').value;
  try {
    var res  = await fetch(SCAN_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ code: code, gate: gate }) });
    var data = await res.json();
    buildModal(code, data);
  } catch (e) {
    playBuzz();
    openModal('warn', '⚠️', 'Network Error', '', code, [['Detail', e.message || 'Could not reach scanner']]);
  } finally {
    processing = false;
  }
}

function fmtDate(d) {
  if (!d) return d;
  try {
    var parts = d.split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
  } catch(e) { return d; }
}

function buildModal(code, data) {
  if (data.success) {
    playChime();  // ← success chime
    if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

    var timeParts = (data.last_entry || '').split(' · ');
    var gate      = timeParts[0] || '';
    var time      = timeParts.slice(1).join(' · ');
    var pushHtml  = data.push && data.push.succeeded > 0
      ? '<div class="push-badge push-ok">📱 Wallet updated · ' + data.push.succeeded + ' device' + (data.push.succeeded > 1 ? 's' : '') + '</div>'
      : '<div class="push-badge push-none">📱 No wallet devices</div>';

    if (data.is_visitor) {
      var rows = [];
      if (data.host_unit)     rows.push(['Visiting', data.host_unit]);
      if (data.purpose)       rows.push(['Purpose',  data.purpose]);
      if (data.visitor_phone) rows.push(['Phone',    data.visitor_phone]);
      if (gate) rows.push(['Gate', gate]);
      if (time) rows.push(['Time', time]);
      rows.push(['Scans', String(data.scan_sequence || 1) + ' / 3']);
      if (data.valid_date) rows.push(['Valid', data.valid_date + ' only']);
      openModal('visitor', '👤', data.holder_name || 'Visitor', 'VISITOR PASS', code, rows, pushHtml, true);
      addHistory(code, data.holder_name || 'Visitor', 'visitor', data.last_entry);
    } else {
      var pt   = data.pass_type || 'resident';
      var rows = [];
      var icon     = '✅';
      var subtitle = '';
      switch (pt) {
        case 'tennis':
          icon = '🎾'; subtitle = 'Tennis Court Booking';
          if (data.court)     rows.push(['Court',   data.court]);
          if (data.date)      rows.push(['Date',    fmtDate(data.date)]);
          if (data.time_slot) rows.push(['Slot',    data.time_slot]);
          if (data.unit)      rows.push(['Unit',    data.unit]);
          if (data.guests)    rows.push(['Players', String(data.guests)]);
          break;
        case 'bbq':
          icon = '🔥'; subtitle = 'BBQ Pit Booking';
          if (data.pit_number) rows.push(['Pit',    data.pit_number]);
          if (data.date)       rows.push(['Date',   fmtDate(data.date)]);
          if (data.time_slot)  rows.push(['Slot',   data.time_slot]);
          if (data.pax)        rows.push(['Guests', String(data.pax) + ' pax']);
          break;
        case 'ktv':
          icon = '🎤'; subtitle = 'KTV Room Booking';
          if (data.room)      rows.push(['Room',   data.room]);
          if (data.date)      rows.push(['Date',   fmtDate(data.date)]);
          if (data.time_slot) rows.push(['Slot',   data.time_slot]);
          if (data.pax)       rows.push(['Guests', String(data.pax) + ' pax']);
          break;
        case 'gym':
          icon = '🏋️'; subtitle = 'Gym Access';
          if (data.unit) rows.push(['Unit', data.unit + (data.block ? ' · ' + data.block : '')]);
          if (data.membership_type) rows.push(['Membership', data.membership_type]);
          if (data.gym_hours) rows.push(['Hours', data.gym_hours]);
          break;
        case 'pool':
          icon = '🏊'; subtitle = 'Swimming Pool Access';
          if (data.unit) rows.push(['Unit', data.unit + (data.block ? ' · ' + data.block : '')]);
          if (data.pool_hours) rows.push(['Hours', data.pool_hours]);
          break;
        case 'contractor':
          icon = '🔧'; subtitle = 'Contractor / Service Pass';
          if (data.company_name)    rows.push(['Company', data.company_name]);
          if (data.authorized_unit) rows.push(['Unit',    data.authorized_unit]);
          if (data.work_scope)      rows.push(['Scope',   data.work_scope]);
          if (data.valid_until)     rows.push(['Until',   data.valid_until]);
          break;
        default:
          icon = '✅'; subtitle = data.tier ? data.tier + ' — Resident Card' : 'Resident Card';
          if (data.unit) rows.push(['Unit', data.unit + (data.block ? ' · ' + data.block : '')]);
          if (data.tier) rows.push(['Tier', data.tier]);
      }
      if (gate) rows.push(['Gate',  gate]);
      if (time) rows.push(['Time',  time]);
      rows.push(['Scans', String(data.scan_sequence || 1)]);
      openModal('valid', icon, data.holder_name || 'Valid Pass', subtitle, code, rows, pushHtml, false);
      addHistory(code, data.holder_name || 'Unknown', 'ok', data.last_entry, pt);
    }
  } else {
    playBuzz();  // ← failure buzz
    if (navigator.vibrate) navigator.vibrate(300);
    var expired = data.status === 'expired';
    var revoked = data.status === 'revoked';
    var theme   = (expired || revoked) ? 'invalid' : 'warn';
    var icon    = expired ? '⏰' : revoked ? '🚫' : data.status === 'used' ? '🔒' : '❌';
    var heading = expired ? 'Pass Expired' : revoked ? 'Pass Revoked' : data.status === 'used' ? 'Pass Used' : 'Invalid Pass';
    var rows    = [['Reason', data.error || data.status || 'Unknown']];
    if (data.holder_name) rows.push(['Holder', data.holder_name]);
    openModal(theme, icon, heading, '', code, rows, '', false);
    addHistory(code, data.holder_name || 'Unknown', 'fail', null, '');
  }
}

function openModal(theme, icon, title, subtitle, code, rows, extraHtml, isVisitor) {
  if (extraHtml  === undefined) extraHtml  = '';
  if (isVisitor  === undefined) isVisitor  = false;
  document.getElementById('modal').className      = 'modal ' + theme;
  document.getElementById('m-icon').textContent   = icon;
  document.getElementById('m-title').textContent  = title;
  document.getElementById('m-subtitle').textContent = subtitle;
  document.getElementById('m-code').textContent   = code;
  document.getElementById('m-visitor-badge').style.display = isVisitor ? 'block' : 'none';
  document.getElementById('m-body').innerHTML =
    rows.map(function(r) { return '<div class="modal-row"><span class="lbl">' + r[0] + '</span><span class="val">' + r[1] + '</span></div>'; }).join('');
  document.getElementById('m-push').innerHTML = extraHtml;
  document.getElementById('modal-backdrop').classList.add('open');
  modalOpen = true;
  showLockBanner(true);
  document.getElementById('code-input').value = '';
  setTimeout(function() { document.getElementById('m-dismiss').focus(); }, 50);
}

function dismissModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  modalOpen = false; showLockBanner(false); lockUI(false);
}
document.getElementById('modal-backdrop').addEventListener('click', function(e) { if (e.target === this) dismissModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && modalOpen) dismissModal(); });

function lockUI(lock) {
  var btn = document.getElementById('scan-btn');
  btn.disabled = lock; btn.textContent = lock ? 'Scanning…' : 'Scan';
  document.getElementById('code-input').disabled = lock;
  document.getElementById('gate-sel').disabled   = lock;
}
function showLockBanner(show) {
  document.getElementById('lock-banner').classList.toggle('show', show);
  document.getElementById('reader-wrap').classList.toggle('locked', show);
}

function addHistory(code, name, type, entry, passType) {
  var now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Singapore' });
  var icons = { tennis:'🎾', bbq:'🔥', ktv:'🎤', gym:'🏋️', pool:'🏊', contractor:'🔧', visitor:'👤' };
  var ptIcon = icons[passType] || '';
  scanHistory.unshift({ code: code, name: name, type: type, entry: entry, time: now, ptIcon: ptIcon });
  if (scanHistory.length > 20) scanHistory.pop();
  document.getElementById('history').innerHTML = scanHistory.map(function(h) {
    return '<div class="history-item">' +
      '<div class="hi-dot ' + h.type + '"></div>' +
      '<div class="hi-name">' + (h.ptIcon ? h.ptIcon + ' ' : '') + h.name + '</div>' +
      '<div class="hi-code">' + h.code + '</div>' +
      '<div class="hi-time">' + h.time + '</div>' +
    '</div>';
  }).join('');
}
</script>
